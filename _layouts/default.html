<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != "Home" %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <nav class="site-nav">
    <a href="{{ '/' | relative_url }}" class="nav-logo">{{ site.title }}</a>
    <input type="text" id="search-input" class="search-input" placeholder="Search posts..." aria-label="Search posts">
  </nav>
  <main class="content">
    {{ content }}
  </main>
  <footer class="site-footer">
    <p>Powered by ILWAT&trade; &mdash; It just works.</p>
  </footer>
</body>
</html>
