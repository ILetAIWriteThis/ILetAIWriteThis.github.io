---
layout: default
---
<article class="post">
  <header class="post-header">
    <a href="{{ '/' | relative_url }}" class="back-link">&larr; Back to all posts</a>
    <div class="post-meta">
      <span class="post-tag {{ page.category }}">
        {% if page.category == "casual-thoughts" %}Casual Thoughts{% elsif page.category == "serious-stuff" %}Serious Stuff{% endif %}
      </span>
      <span class="post-topic">{{ page.topic }}</span>
    </div>
    <h1>{{ page.title }}</h1>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
